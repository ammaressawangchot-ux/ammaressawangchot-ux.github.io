<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammares Sawangchot - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-color: #e0e0e0;
            --accent-color: #E50914; /* สีแดงสไตล์โรงภาพยนตร์ */
            --box-bg: #141414;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Prompt', sans-serif;
            margin: 0;
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        /* แถบเมนูด้านบน */
        header {
            background: linear-gradient(to bottom, #2a0000, #0b0b0b);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        h1 { margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; font-size: 1.8em; }
        nav { margin-top: 15px; }
        nav a {
            color: #ccc;
            text-decoration: none;
            margin: 0 12px;
            font-weight: 600;
            transition: color 0.3s;
            font-size: 0.95em;
        }
        nav a:hover { color: var(--accent-color); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section-title {
            font-size: 1.8em;
            color: #fff;
            border-left: 5px solid var(--accent-color);
            padding-left: 15px;
            margin: 60px 0 30px 0;
            text-transform: uppercase;
        }

        /* กล่อง About Me พร้อมรูปโปรไฟล์ */
        .about-box {
            background: var(--box-bg);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.1);
            border: 1px solid #333;
        }
        .about-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        @media (min-width: 900px) {
            .about-content {
                flex-direction: row;
                align-items: flex-start;
            }
        }
        /* ตั้งค่ารูปโปรไฟล์ให้รองรับภาพแนวนอน */
        .profile-img {
            width: 100%;
            max-width: 480px;
            height: auto;
            border-radius: 8px;
            border: 3px solid var(--accent-color);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
            flex-shrink: 0; 
        }
        .about-text {
            flex: 1;
        }
        .thai-distributed {
            text-align: justify;
            text-justify: inter-word;
            font-size: 1.1em;
            line-height: 1.8;
            color: #ddd;
            text-indent: 2em; /* ย่อหน้า */
        }

        /* Grid สำหรับ Video และ Image */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--box-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #222;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.2);
            border-color: var(--accent-color);
        }
        
        /* วิดีโอ (16:9) */
        .video-wrap {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000;
        }
        .video-wrap iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .card-info { padding: 15px; }
        .card-title { font-size: 1em; color: #fff; margin: 0 0 5px 0; font-weight: 600; }
        .card-desc { font-size: 0.85em; color: #aaa; margin: 0; }

        /* การ์ดภาพนิ่ง (ลิงก์ออก) */
        .photo-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            background: linear-gradient(45deg, #1a0000, #330000);
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            transition: 0.3s;
        }
        .photo-card:hover { background: var(--accent-color); color: #fff; }

        /* แกลเลอรีเบื้องหลังการทำงาน */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .gallery-item img:hover { border-color: var(--accent-color); transform: scale(1.02); }
        
        .drive-link-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }
        .drive-link-btn:hover { background-color: #b0060f; }

        /* ไอคอนติดต่อ */
        .contact-box { text-align: center; margin-top: 20px; }
        .contact-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .contact-item {
            background: var(--box-bg);
            padding: 20px 30px;
            border-radius: 10px;
            text-decoration: none;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
